<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#4263eb" />

  <!-- Sound wave / murmur waveform -->
  <!-- Center vertical bar -->
  <rect x="60" y="34" width="8" height="60" rx="4" fill="white" />

  <!-- Left wave bars (decreasing height outward) -->
  <rect x="44" y="38" width="8" height="52" rx="4" fill="white" />
  <rect x="28" y="44" width="8" height="40" rx="4" fill="white" opacity="0.85" />
  <rect x="12" y="50" width="8" height="28" rx="4" fill="white" opacity="0.6" />

  <!-- Right wave bars (decreasing height outward) -->
  <rect x="76" y="38" width="8" height="52" rx="4" fill="white" />
  <rect x="92" y="44" width="8" height="40" rx="4" fill="white" opacity="0.85" />
  <rect x="108" y="50" width="8" height="28" rx="4" fill="white" opacity="0.6" />

  <!-- Small dot accents -->
  <circle cx="16" cy="56" r="2.5" fill="white" opacity="0.5" />
  <circle cx="112" cy="56" r="2.5" fill="white" opacity="0.5" />
</svg>
